<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>乗車券購入シミュレーションツール</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Ticket Cost Simulator</p>
        <h1>乗車券購入シミュレーション</h1>
      </div>
    </header>

    <main class="app-main">
      <section class="panel" aria-labelledby="cost-title">
        <div class="section-head">
          <h2 id="cost-title">費用設定</h2>
          <button class="ghost-button" type="button" id="reset-settings">初期化</button>
        </div>

        <div class="cost-grid">
          <label class="check-card">
            <input type="checkbox" id="use-rtt" checked>
            <span>往復乗車券を使う</span>
          </label>
          <label class="field">
            <span>片道乗車券費用</span>
            <input id="fare-one-way" type="number" min="0" step="10" inputmode="numeric" value="250">
          </label>

          <label class="check-card">
            <input type="checkbox" id="use-cmt1m" checked>
            <span>1ヶ月定期券を使う</span>
          </label>
          <label class="field">
            <span>1ヶ月定期券費用</span>
            <input id="fare-cmt1m" type="number" min="0" step="100" inputmode="numeric" value="9000">
          </label>

          <label class="check-card">
            <input type="checkbox" id="use-cmt3m" checked>
            <span>3ヶ月定期券を使う</span>
          </label>
          <label class="field">
            <span>3ヶ月定期券費用</span>
            <input id="fare-cmt3m" type="number" min="0" step="100" inputmode="numeric" value="25650">
          </label>

          <label class="check-card">
            <input type="checkbox" id="use-cmt6m" checked>
            <span>6ヶ月定期券を使う</span>
          </label>
          <label class="field">
            <span>6ヶ月定期券費用</span>
            <input id="fare-cmt6m" type="number" min="0" step="100" inputmode="numeric" value="48600">
          </label>
        </div>
      </section>

      <section class="panel" aria-labelledby="date-title">
        <div class="section-head">
          <h2 id="date-title">日付設定</h2>
          <button class="ghost-button" type="button" id="generate-dates">日付リスト更新</button>
        </div>

        <div class="date-settings">
          <label class="field">
            <span>開始日</span>
            <input id="start-date" type="date">
          </label>
          <label class="field">
            <span>終了日</span>
            <input id="end-date" type="date">
          </label>
        </div>

        <fieldset class="weekday-box">
          <legend>有効曜日</legend>
          <div class="weekday-grid">
            <label><input type="checkbox" name="weekday" value="1" checked> 月</label>
            <label><input type="checkbox" name="weekday" value="2" checked> 火</label>
            <label><input type="checkbox" name="weekday" value="3" checked> 水</label>
            <label><input type="checkbox" name="weekday" value="4" checked> 木</label>
            <label><input type="checkbox" name="weekday" value="5" checked> 金</label>
            <label><input type="checkbox" name="weekday" value="6"> 土</label>
            <label><input type="checkbox" name="weekday" value="0"> 日</label>
          </div>
        </fieldset>

        <div class="option-row">
          <label class="check-card compact"><input type="checkbox" id="exclude-weekend"> 土日を除く</label>
          <label class="check-card compact"><input type="checkbox" id="exclude-holiday" checked> 祝日を除く</label>
        </div>
      </section>

      <section class="panel" aria-labelledby="list-title">
        <div class="section-head">
          <div>
            <h2 id="list-title">日付リスト</h2>
            <p class="note" id="date-summary">有効日 0 日</p>
          </div>
        </div>

        <div class="table-wrap date-table-wrap">
          <table>
            <thead>
              <tr>
                <th>有効</th>
                <th>日付</th>
                <th>曜日</th>
                <th>祝日名</th>
              </tr>
            </thead>
            <tbody id="date-list-body"></tbody>
          </table>
        </div>
      </section>

      <div class="action-bar">
        <button class="primary-button" type="button" id="simulate-button">シミュレート実行</button>
      </div>

      <section class="panel result-panel" aria-labelledby="result-title">
        <div class="section-head">
          <h2 id="result-title">結果表示</h2>
          <button class="ghost-button" type="button" id="download-csv" disabled>CSVダウンロード</button>
        </div>
        <div id="result-area" class="empty-result">条件を設定して「シミュレート実行」を押してください。</div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
